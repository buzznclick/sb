<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Multi-Site Search Launcher</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeecea;
    --text: #1a1a18;
    --text2: #6b6a66;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb;
    --info-border: #378add;
    --info-text: #0c447c;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2a2a28;
      --bg3: #333330;
      --text: #f0ede8;
      --text2: #9e9b96;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --info-bg: #042c53;
      --info-border: #378add;
      --info-text: #b5d4f4;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 1.75rem 2rem;
    width: 100%;
    max-width: 660px;
  }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }

  .search-row { display: flex; gap: 8px; margin-bottom: 1.75rem; }
  .search-row input {
    flex: 1; height: 42px; padding: 0 14px;
    border-radius: var(--radius); border: 0.5px solid var(--border2);
    background: var(--bg); color: var(--text);
    font-size: 15px; outline: none;
  }
  .search-row input:focus { box-shadow: 0 0 0 2px var(--info-border); }
  .search-row button {
    height: 42px; padding: 0 20px;
    border-radius: var(--radius); border: 0.5px solid var(--border2);
    background: var(--bg); color: var(--text);
    font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .search-row button:hover { background: var(--bg2); }
  .search-row button:active { transform: scale(0.98); }

  .global-row { display: flex; gap: 6px; margin-bottom: 1.25rem; align-items: center; }
  .global-row span { font-size: 12px; color: var(--text2); margin-right: 2px; }
  .global-row button {
    font-size: 12px; padding: 3px 10px;
    border-radius: var(--radius); border: 0.5px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer;
  }
  .global-row button:hover { color: var(--text); background: var(--bg2); }

  .section { margin-bottom: 1.25rem; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .section-label {
    font-size: 11px; font-weight: 500; color: var(--text2);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .section-btns { display: flex; gap: 4px; }
  .section-btns button {
    font-size: 11px; padding: 2px 8px;
    border-radius: var(--radius); border: 0.5px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer;
  }
  .section-btns button:hover { color: var(--text); background: var(--bg2); }

  .engines-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 7px;
  }
  .engine-card {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 11px;
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    user-select: none; transition: border-color 0.12s;
  }
  .engine-card.selected {
    border: 1.5px solid var(--info-border);
    background: var(--info-bg);
  }
  .engine-card input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--info-border); flex-shrink: 0; cursor: pointer; }
  .engine-label { font-size: 13px; color: var(--text); }
  .engine-card.selected .engine-label { color: var(--info-text); font-weight: 500; }

  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }

  .add-section { margin-bottom: 0.5rem; }
  .add-row { display: flex; gap: 8px; }
  .add-row input {
    height: 36px; padding: 0 10px;
    border-radius: var(--radius); border: 0.5px solid var(--border);
    background: var(--bg2); color: var(--text);
    font-size: 13px; outline: none;
  }
  .add-row input:focus { box-shadow: 0 0 0 2px var(--info-border); }
  #custom-name { width: 130px; flex-shrink: 0; }
  #custom-url { flex: 1; }
  .add-row button {
    height: 36px; padding: 0 14px; flex-shrink: 0;
    border-radius: var(--radius); border: 0.5px solid var(--border);
    background: var(--bg2); color: var(--text2);
    font-size: 13px; cursor: pointer;
  }
  .add-row button:hover { background: var(--bg); color: var(--text); }
  .hint { font-size: 11px; color: var(--text2); margin-top: 6px; }
  .status { font-size: 12px; color: var(--text2); margin-top: 1rem; min-height: 18px; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <h1>Multi-site search</h1>
  <p class="sub">Type a query, pick your sites, and open them all at once.</p>

  <div class="search-row">
    <input type="text" id="query" placeholder="Enter your search query..." />
    <button onclick="launchSearch()">Search ↗</button>
  </div>

  <div class="global-row">
    <span>All sites:</span>
    <button onclick="toggleAll(true)">Select all</button>
    <button onclick="toggleAll(false)">Deselect all</button>
  </div>

  <div id="sections-container"></div>

  <hr class="divider" />

  <div class="add-section">
    <div class="section-header">
      <div class="section-label">Add a custom site</div>
    </div>
    <div class="add-row">
      <input type="text" id="custom-name" placeholder="Name (e.g. Reddit)" />
      <input type="text" id="custom-url" placeholder="URL with {q} as the query placeholder" />
      <button onclick="addCustom()">Add</button>
    </div>
    <p class="hint">Example: https://www.reddit.com/search/?q={q}</p>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const defaultSections = [
  {
    label: "Search engines",
    key: "search",
    engines: [
      { name: "Google", url: "https://www.google.com/search?q={q}", on: false },
      { name: "DuckDuckGo", url: "https://duckduckgo.com/?q={q}", on: true },
      { name: "Brave Search", url: "https://search.brave.com/search?q={q}", on: false },
      { name: "Wikipedia", url: "https://en.wikipedia.org/w/index.php?search={q}", on: false },
    ]
  },
  {
    label: "Social",
    key: "social",
    engines: [
      { name: "Reddit", url: "https://www.reddit.com/search/?q={q}", on: false },
      { name: "YouTube", url: "https://www.youtube.com/results?search_query={q}", on: false },
      { name: "GitHub", url: "https://github.com/search?q={q}", on: false },
    ]
  },
  {
    label: "Shop",
    key: "shop",
    engines: [
      { name: "eBay", url: "https://www.ebay.com/sch/i.html?_nkw={q}", on: false },
      { name: "Amazon", url: "https://www.amazon.com/s?k={q}", on: false },
    ]
  },
  {
    label: "Bike",
    key: "bike",
    engines: [
      { name: "Bikebug", url: "https://www.bikebug.com/search.php?search_query={q}", on: false },
      { name: "Pushys", url: "https://www.pushys.com.au/search.php?search_query={q}", on: false },
      { name: "MTB Direct", url: "https://www.mtbdirect.com.au/search?q={q}", on: false },
    ]
  },
  {
    label: "3D print",
    key: "3dprint",
    engines: [
      { name: "3DSearch", url: "https://3dsearch.net/?q={q}", on: false },
      { name: "Three Drop", url: "https://three-drop.com/?q={q}", on: false },
      { name: "MakerWorld", url: "https://makerworld.com/en/search/models?keyword={q}", on: false },
    ]
  },
];

let sections = JSON.parse(localStorage.getItem('msl-sections') || 'null') || defaultSections;

function save() {
  try { localStorage.setItem('msl-sections', JSON.stringify(sections)); } catch(e) {}
}

function render() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  sections.forEach((sec, si) => {
    const wrap = document.createElement('div');
    wrap.className = 'section';
    wrap.innerHTML = `
      <div class="section-header">
        <div class="section-label">${sec.label}</div>
        <div class="section-btns">
          <button onclick="toggleSection(${si}, true)">All</button>
          <button onclick="toggleSection(${si}, false)">None</button>
        </div>
      </div>
      <div class="engines-grid" id="grid-${si}"></div>
    `;
    container.appendChild(wrap);

    const grid = document.getElementById(`grid-${si}`);
    sec.engines.forEach((e, ei) => {
      const card = document.createElement('label');
      card.className = 'engine-card' + (e.on ? ' selected' : '');
      card.innerHTML = `<input type="checkbox" ${e.on ? 'checked' : ''} onchange="toggle(${si},${ei},this.checked)" /><span class="engine-label">${e.name}</span>`;
      grid.appendChild(card);
    });
  });
}

function toggle(si, ei, val) {
  sections[si].engines[ei].on = val;
  save(); render();
}

function toggleSection(si, val) {
  sections[si].engines.forEach(e => e.on = val);
  save(); render();
}

function toggleAll(val) {
  sections.forEach(sec => sec.engines.forEach(e => e.on = val));
  save(); render();
}

function addCustom() {
  const name = document.getElementById('custom-name').value.trim();
  const url = document.getElementById('custom-url').value.trim();
  const st = document.getElementById('status');
  if (!name || !url) { st.textContent = 'Please fill in both the name and URL.'; return; }
  if (!url.includes('{q}')) { st.textContent = 'The URL must include {q} as a placeholder for the query.'; return; }
  const last = sections[sections.length - 1];
  if (last.key === 'custom') {
    last.engines.push({ name, url, on: true });
  } else {
    sections.push({ label: 'Custom', key: 'custom', engines: [{ name, url, on: true }] });
  }
  save(); render();
  document.getElementById('custom-name').value = '';
  document.getElementById('custom-url').value = '';
  st.textContent = `"${name}" added and selected.`;
  setTimeout(() => st.textContent = '', 3000);
}

function launchSearch() {
  const q = document.getElementById('query').value.trim();
  const st = document.getElementById('status');
  if (!q) { st.textContent = 'Please enter a search query.'; return; }
  const selected = sections.flatMap(s => s.engines).filter(e => e.on);
  if (!selected.length) { st.textContent = 'Please select at least one site.'; return; }
  selected.forEach(e => window.open(e.url.replace('{q}', encodeURIComponent(q)), '_blank'));
  st.textContent = `Opened ${selected.length} tab${selected.length > 1 ? 's' : ''} for "${q}"`;
  setTimeout(() => st.textContent = '', 4000);
}

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') launchSearch();
});

render();
</script>
</body>
</html>
