<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ride Log · SRAM AXS vs BTC vs AUD/CNY</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: ui-monospace, 'Cascadia Code', 'Menlo', 'Courier New', monospace;
    background: #f5f5f2;
    color: #1a1a1a;
    font-size: 13px;
    min-height: 100vh;
  }

  header {
    background: #fff;
    border-bottom: 2px solid #1a1a1a;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  header .subtitle { font-size: 11px; color: #888; }

  main { padding: 28px; max-width: 1200px; margin: 0 auto; }

  /* STATUS */
  .status-bar { font-size: 10px; color: #aaa; text-align: right; margin-bottom: 12px; letter-spacing: 0.5px; min-height: 16px; }
  .status-bar.ok  { color: #059669; }
  .status-bar.err { color: #dc2626; }

  /* STAT CARDS */
  .stat-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }

  .stat-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-top: 3px solid var(--accent);
    padding: 12px 16px;
  }

  .stat-card .label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: #999; margin-bottom: 5px; }
  .stat-card .value { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }

  /* CHART */
  .chart-wrap { background: #fff; border: 1px solid #e0e0e0; padding: 24px 20px 16px; overflow: hidden; }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .chart-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #999; }
  .chart-count { font-size: 10px; color: #aaa; }

  /* RANGE SLIDERS */
  .range-section {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #f0f0f0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .range-item label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaa;
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .range-item label span { color: #2563eb; font-weight: 700; }
  .range-item input[type=range] { width: 100%; accent-color: #2563eb; display: block; }

  /* LEGEND */
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 14px; padding-top: 14px; border-top: 1px solid #f0f0f0; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #555;
    cursor: pointer;
    user-select: none;
  }

  .legend-item .dot { width: 24px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .legend-item.hidden { opacity: 0.35; }

  @media (max-width: 700px) {
    .stat-row { grid-template-columns: repeat(3, 1fr); }
    .range-section { grid-template-columns: 1fr; }
    header .subtitle { display: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>⛰ Ride Log</h1>
    <div class="subtitle">SRAM AXS Shifts · Distance · Elevation · BTC · AUD/CNY</div>
  </div>
</header>

<main>
  <div class="status-bar" id="status"></div>

  <div class="stat-row">
    <div class="stat-card" style="--accent:#2563eb">
      <div class="label">Rides</div>
      <div class="value" id="stat-rides">—</div>
    </div>
    <div class="stat-card" style="--accent:#64748b">
      <div class="label">Total km</div>
      <div class="value" id="stat-km">—</div>
    </div>
    <div class="stat-card" style="--accent:#059669">
      <div class="label">Total elev</div>
      <div class="value" id="stat-elev">—</div>
    </div>
    <div class="stat-card" style="--accent:#2563eb">
      <div class="label">Total shifts</div>
      <div class="value" id="stat-shifts">—</div>
    </div>
    <div class="stat-card" style="--accent:#9333ea">
      <div class="label">Avg shifts/km</div>
      <div class="value" id="stat-avg">—</div>
    </div>
  </div>

  <div class="chart-wrap">
    <div class="chart-header">
      <div class="chart-title">All metrics · by ride date — click legend to toggle</div>
      <div class="chart-count" id="chart-count"></div>
    </div>

    <div style="position:relative; height:420px; width:100%;"><canvas id="mainChart" role="img" aria-label="Multi-line chart of ride metrics over time"></canvas></div>

    <div class="range-section">
      <div class="range-item">
        <label>From <span id="label-start"></span></label>
        <input type="range" id="range-start" min="0" value="0" step="1">
      </div>
      <div class="range-item">
        <label>To <span id="label-end"></span></label>
        <input type="range" id="range-end" value="0" step="1">
      </div>
    </div>

    <div class="legend" id="legend"></div>
  </div>
</main>

<script>
const SERIES = [
  { key:'dist',  label:'Distance (km)',   color:'#64748b', yAxis:'y1' },
  { key:'elev',  label:'Elevation (m)',   color:'#059669', yAxis:'y2' },
  { key:'gear',  label:'Gear Shifts',     color:'#2563eb', yAxis:'y3' },
  { key:'btc',   label:'BTC Price (USD)', color:'#d97706', yAxis:'y4' },
  { key:'fx',    label:'AUD/CNY Rate',    color:'#9333ea', yAxis:'y5' },
];

let chart = null;
let hidden = {};
let allRides = [];

// ── PARSE CSV ─────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  // Skip header row
  return lines.slice(1).map(line => {
    const [date, dist, elev, gear, btc, fx] = line.split(',').map(v => v.trim());
    return {
      date,
      dist: parseFloat(dist),
      elev: parseInt(elev),
      gear: parseInt(gear),
      btc:  parseInt(btc),
      fx:   parseFloat(fx),
    };
  }).filter(r => r.date && !isNaN(r.dist));
}

// ── CHART ─────────────────────────────────────────────────────────────────────
function buildChart(rides) {
  const yHidden = { display: false, grid: { drawOnChartArea: false } };
  const yAxes = {};
  SERIES.forEach((s, i) => {
    yAxes[s.yAxis] = { ...yHidden, position: i % 2 === 0 ? 'left' : 'right' };
  });

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('mainChart'), {
    type: 'line',
    data: {
      labels: rides.map(r => r.date),
      datasets: SERIES.map(s => ({
        label: s.label,
        data: rides.map(r => r[s.key]),
        borderColor: s.color,
        backgroundColor: s.color + '15',
        borderWidth: 2,
        pointRadius: rides.length > 50 ? 0 : 4,
        pointHoverRadius: 5,
        pointBackgroundColor: '#fff',
        pointBorderColor: s.color,
        pointBorderWidth: 2,
        tension: 0.35,
        yAxisID: s.yAxis,
        hidden: !!hidden[s.key],
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 150 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#d0d0d0',
          borderWidth: 1,
          titleColor: '#888',
          bodyColor: '#1a1a1a',
          titleFont: { family: 'ui-monospace, monospace', size: 10 },
          bodyFont: { family: 'ui-monospace, monospace', size: 12 },
          padding: 12,
          callbacks: {
            label: ctx => {
              const s = SERIES[ctx.datasetIndex];
              const v = ctx.parsed.y;
              if (s.key === 'btc')  return '  ' + s.label + ': $' + v.toLocaleString();
              if (s.key === 'fx')   return '  ' + s.label + ': ' + v.toFixed(3);
              if (s.key === 'dist') return '  ' + s.label + ': ' + v.toFixed(1) + ' km';
              if (s.key === 'elev') return '  ' + s.label + ': ' + v.toLocaleString() + ' m';
              return '  ' + s.label + ': ' + v.toLocaleString();
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#f0f0f0' },
          ticks: {
            font: { family: 'ui-monospace, monospace', size: 10 },
            color: '#aaa',
            maxRotation: 35,
            autoSkip: true,
            maxTicksLimit: 12,
          },
        },
        ...yAxes,
      }
    }
  });
}

function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  SERIES.forEach(s => {
    const item = document.createElement('div');
    item.className = 'legend-item' + (hidden[s.key] ? ' hidden' : '');
    item.innerHTML = '<div class="dot" style="background:' + s.color + '"></div>' + s.label;
    item.onclick = () => {
      hidden[s.key] = !hidden[s.key];
      item.classList.toggle('hidden');
      const ds = chart.data.datasets.find(d => d.label === s.label);
      if (ds) { ds.hidden = hidden[s.key]; chart.update(); }
    };
    el.appendChild(item);
  });
}

function buildStats(rides) {
  const totalDist = rides.reduce((a, r) => a + r.dist, 0);
  const totalGear = rides.reduce((a, r) => a + r.gear, 0);
  document.getElementById('stat-rides').textContent  = rides.length;
  document.getElementById('stat-km').textContent     = totalDist.toFixed(1);
  document.getElementById('stat-elev').textContent   = rides.reduce((a, r) => a + r.elev, 0).toLocaleString() + 'm';
  document.getElementById('stat-shifts').textContent = totalGear.toLocaleString();
  document.getElementById('stat-avg').textContent    = totalDist ? (totalGear / totalDist).toFixed(1) : '0.0';
}

// ── SLIDERS ───────────────────────────────────────────────────────────────────
function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleString('default', { month: 'short', year: 'numeric' });
}

function initSliders(total) {
  const rs = document.getElementById('range-start');
  const re = document.getElementById('range-end');
  rs.max = total - 1;
  re.max = total - 1;
  rs.value = 0;
  re.value = total - 1;
  updateSliderLabels(0, total - 1);
}

function updateSliderLabels(s, e) {
  document.getElementById('label-start').textContent = allRides[s] ? fmtDate(allRides[s].date) : '';
  document.getElementById('label-end').textContent   = allRides[e] ? fmtDate(allRides[e].date) : '';
  const count = e - s + 1;
  document.getElementById('chart-count').textContent = 'Showing ' + count + ' ride' + (count !== 1 ? 's' : '');
}

function applySlice() {
  let s = parseInt(document.getElementById('range-start').value);
  let e = parseInt(document.getElementById('range-end').value);
  if (s > e) { s = e; document.getElementById('range-start').value = s; }
  const slice = allRides.slice(s, e + 1);
  chart.data.labels = slice.map(r => r.date);
  SERIES.forEach((ser, i) => { chart.data.datasets[i].data = slice.map(r => r[ser.key]); });
  chart.data.datasets.forEach(ds => { ds.pointRadius = slice.length > 50 ? 0 : 4; });
  chart.update('none');
  buildStats(slice);
  updateSliderLabels(s, e);
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadCSV() {
  const status = document.getElementById('status');
  try {
    const res = await fetch('rides.csv');
    if (!res.ok) throw new Error('rides.csv not found — make sure it is in the same folder as index.html');
    const text = await res.text();
    const rides = parseCSV(text);
    if (!rides.length) throw new Error('No valid rides found in rides.csv — check the format');

    allRides = rides.sort((a, b) => a.date.localeCompare(b.date));

    buildStats(allRides);
    buildChart(allRides);
    buildLegend();
    initSliders(allRides.length);

    document.getElementById('range-start').oninput = applySlice;
    document.getElementById('range-end').oninput   = applySlice;

    status.textContent = allRides.length + ' rides loaded · last ride ' + allRides[allRides.length - 1].date;
    status.className = 'status-bar ok';

  } catch(e) {
    status.textContent = e.message;
    status.className = 'status-bar err';
    console.error(e);
  }
}

loadCSV();
</script>
</body>
</html>
